pixelshield:
  version: "1.0.0"
  output_dir: "output"
  log_dir: "logs"

encryption:
  algorithm: "aes-256-gcm"       # aes-256-cbc | aes-256-gcm | hybrid
  key_size: 32                   # bytes (256 bits)
  iv_size: 16                    # bytes

pixel_operations:
  shuffle: true
  channel_rotation: true
  bit_rotation: false
  bit_rotation_amount: 2         # bits to rotate (1-7)

chaos:
  enabled: false
  r: 3.99                        # logistic map parameter (3.57 < r <= 4)
  x0: 0.5                        # initial value

noise:
  enabled: false
  sigma: 5.0                     # gaussian noise std dev

compression:
  enabled: false
  level: 6                       # zlib compression level (1-9)

security:
  argon2_time_cost: 3
  argon2_memory_cost: 65536      # KB (64 MB)
  argon2_parallelism: 4
  argon2_hash_len: 32
  remove_metadata: true
  verify_integrity: true
  secure_wipe: false

analysis:
  entropy: true
  histogram: false

logging:
  level: "INFO"
  rotation: "10 MB"
  retention: "30 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"

plugins:
  enabled: false
  directory: "plugins"
