[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "T20"]
ignore = [
    "S101",   # assert statements are fine in tests
    "S311",   # standard pseudo-random generators are OK for non-crypto use
    "T201",   # print is fine (we use Rich for CLI output)
]
exclude = ["tests/", ".github/"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]  # assert_used – fine in tests

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "setup.py", "output/*", "logs/*"]
